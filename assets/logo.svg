    <line x1="22" y1="44" x2="98" y2="44" stroke="#34D399" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="22" y1="66" x2="98" y2="66" stroke="#60A5FA" stroke-width="1" stroke-opacity="0.4"/>
    <!-- SQL label -->
