    <rect x="140" y="0" width="82" height="22" rx="5" fill="#34D399" fill-opacity="0.1" stroke="#34D399" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="181" y="15" text-anchor="middle" fill="#34D399" font-size="10">3 machines</text>
    <rect x="228" y="0" width="64" height="22" rx="5" fill="#60A5FA" fill-opacity="0.1" stroke="#60A5FA" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="260" y="15" text-anchor="middle" fill="#60A5FA" font-size="10">MEXC</text>
