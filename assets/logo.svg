  </g>
  <text x="156" y="54" fill="url(#g1)" font-size="26" font-weight="800" letter-spacing="-0.5" filter="url(#glow)">BASE·SQL3·HUB</text>
  <text x="157" y="77" fill="#2A3A30" font-size="12.5" letter-spacing="0.5">Centralized SQLite3 — Multi-GPU Trading AI Cluster</text>
  <rect x="156" y="87" width="340" height="1.5" rx="1" fill="url(#g1)" opacity="0.3"/>
