    <rect x="22" y="22" width="76" height="68" fill="#06080C" stroke="#34D399" stroke-width="2"/>
    <ellipse cx="60" cy="90" rx="38" ry="10" fill="#06080C" stroke="#34D399" stroke-width="2"/>
